#dependabot configuration for NPM

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    open-pull-requests-limit: 10
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 1
    groups:
      lint:
        patterns:
          - "eslint*"
          - "@eslint*"
          - "globals"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/vite"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
